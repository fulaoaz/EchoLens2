name: Build Artifacts

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-tauri-preview:
    name: Build Tauri Preview (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}
          path: |
            frontend/src-tauri/target/release/bundle/**/*
          retention-days: 7

  summary:
    name: Build Summary
    needs: build-tauri-preview
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## 🎉 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "跨平台客户端已构建完成，可在 Artifacts 中下载。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 可用平台" >> $GITHUB_STEP_SUMMARY
          echo "- Windows: .msi 安装包" >> $GITHUB_STEP_SUMMARY
          echo "- macOS: .dmg 安装包 (Universal)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux: .AppImage 安装包" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 创建正式 Release" >> $GITHUB_STEP_SUMMARY
          echo "如需创建正式 Release，请运行：" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "git tag v2.0.0-rc1" >> $GITHUB_STEP_SUMMARY
          echo "git push origin v2.0.0-rc1" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
