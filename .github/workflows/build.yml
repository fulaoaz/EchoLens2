name: Build Artifacts

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    name: Build Windows (Tauri)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri
          path: |
            frontend/src-tauri/target/release/bundle/**/*.msi
            frontend/src-tauri/target/release/bundle/**/*.exe
          retention-days: 7

  build-android:
    name: Build Android (Capacitor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build web app
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build Android APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-capacitor
          path: |
            frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 7

  summary:
    name: Build Summary
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## 🎉 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "跨平台客户端已构建完成，可在 Artifacts 中下载。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 可用平台" >> $GITHUB_STEP_SUMMARY
          echo "- **Windows**: .msi 安装包（Tauri 桌面端）" >> $GITHUB_STEP_SUMMARY
          echo "- **Android**: .apk 安装包（Capacitor 移动端）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 注意事项" >> $GITHUB_STEP_SUMMARY
          echo "- Android APK 为 debug 签名，仅供测试" >> $GITHUB_STEP_SUMMARY
          echo "- 正式发布需要配置签名密钥" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 创建正式 Release" >> $GITHUB_STEP_SUMMARY
          echo "如需创建正式 Release，请运行：" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "git tag v2.0.0-rc1" >> $GITHUB_STEP_SUMMARY
          echo "git push origin v2.0.0-rc1" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
