name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v2.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          prerelease_flag=""
          if [[ "$VERSION" == *rc* || "$VERSION" == *beta* || "$VERSION" == *alpha* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$VERSION" \
            --title "EchoLens $VERSION" \
            --notes "$(cat <<EOF
          ## EchoLens $VERSION

          ### 下载

          - **Docker 后端镜像**: \`ghcr.io/${{ github.repository_owner }}/echolens2-backend:$VERSION\`
          - **Docker 前端镜像**: \`ghcr.io/${{ github.repository_owner }}/echolens2-frontend:$VERSION\`
          - **Windows / Android 客户端**: 仅在仓库包含对应原生工程时自动上传。

          ### 更新日志

          详见 CHANGELOG.md。
          EOF
          )" \
            $prerelease_flag

  build-windows:
    name: Build Windows (Tauri)
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Tauri project
        id: tauri-project
        shell: pwsh
        run: |
          if (Test-Path "frontend/src-tauri/tauri.conf.json") {
            "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
            "Tauri project not found; skipping Windows artifact build." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Setup Node
        if: steps.tauri-project.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        if: steps.tauri-project.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        if: steps.tauri-project.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        if: steps.tauri-project.outputs.exists == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend

      - name: Upload Windows artifacts to Release
        if: steps.tauri-project.outputs.exists == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          $artifacts = Get-ChildItem -Path "frontend/src-tauri/target/release/bundle" -Include *.msi,*.exe -Recurse
          foreach ($artifact in $artifacts) {
            gh release upload $env:VERSION $artifact.FullName --clobber
          }

  build-android:
    name: Build Android (Capacitor)
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Android project
        id: android-project
        run: |
          if [ -f frontend/android/gradlew ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Android project not found; skipping APK build." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Setup Node
        if: steps.android-project.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        if: steps.android-project.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        if: steps.android-project.outputs.exists == 'true'
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        if: steps.android-project.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build web app
        if: steps.android-project.outputs.exists == 'true'
        working-directory: frontend
        run: npm run build:capacitor

      - name: Sync Capacitor
        if: steps.android-project.outputs.exists == 'true'
        working-directory: frontend
        run: npx cap sync android

      - name: Build Android APK
        if: steps.android-project.outputs.exists == 'true'
        working-directory: frontend/android
        run: ./gradlew assembleRelease

      - name: Upload Android APK to Release
        if: steps.android-project.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          for artifact in frontend/android/app/build/outputs/apk/release/*.apk; do
            release_name="EchoLens_${VERSION}_android.apk"
            cp "$artifact" "$release_name"
            gh release upload "$VERSION" "$release_name" --clobber
          done

  build-docker:
    name: Build and Push Docker Images
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: backend
            context: backend
            dockerfile: backend/Dockerfile
          - image: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/echolens2-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.create-release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.create-release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.create-release.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
